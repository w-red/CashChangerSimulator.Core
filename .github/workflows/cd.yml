name: CD Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore CashChangerSimulator.Core.slnx

      - name: Build
        run: dotnet build CashChangerSimulator.Core.slnx --configuration Release --no-restore --warnaserror

      - name: Test
        run: dotnet test test/Tests/CashChangerSimulator.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack CashChangerSimulator.Core.slnx --configuration Release --no-build --output ./artifacts -p:PackageVersion=${{ steps.get_version.outputs.VERSION }}

      - name: Publish to GitHub Packages
        shell: pwsh
        run: |
          $packages = Get-ChildItem "./artifacts/*.nupkg"
          if ($packages) {
            $packages | ForEach-Object {
              dotnet nuget push $_.FullName --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
            }
          } else {
            Write-Error "No .nupkg files found in ./artifacts"
            exit 1
          }
        continue-on-error: true

      - name: Publish to NuGet.org
        if: ${{ env.NUGET_API_KEY != '' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: pwsh
        run: |
          $packages = Get-ChildItem "./artifacts/*.nupkg"
          if ($packages) {
            $packages | ForEach-Object {
              dotnet nuget push $_.FullName --source "https://api.nuget.org/v3/index.json" --api-key ${{ env.NUGET_API_KEY }} --skip-duplicate
            }
          }
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.nupkg
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
